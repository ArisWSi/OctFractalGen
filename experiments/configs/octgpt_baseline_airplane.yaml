# OctGPT Baseline — Airplane, unconditional
# Reference config matching OctGPT's shapenet_uncond.yaml for fair comparison.
#
# This documents the baseline configuration that OctFractalGen is compared
# against. OctGPT uses a single OctFormer processing all depths simultaneously,
# while OctFractalGen uses per-level AR generators recursively.
#
# Key difference: OctGPT's depth_stop=6 (3 split operations) vs our default
# depth_stop=5 (2 AR levels). For a fair A/B comparison at depth_stop=6,
# use a 3-level OctFractalGen config (fractal_levels=[3,4,5]).

baseline:
  model: OctGPT
  description: "Single OctFormer with teacher-forcing cross-depth attention"
  total_params: "~150M (OctFormer: 768 dim, 24 blocks, 8 heads)"

  octree:
    depth: 8             # VQ-VAE full depth
    full_depth: 3
    depth_stop: 6        # Generate from depth 3 to depth 6

  # OctGPT generates splits at depths 3, 4, 5 (creating nodes at 4, 5, 6)
  # then predicts VQ codes at depth 6.
  # Equivalent OctFractalGen config would be:
  #   fractal_levels: [3, 4, 5], depth_stop: 6
  #   embed_dims: [512, 384, 256], num_blocks: [16, 12, 8]

  octformer:
    num_embed: 768
    num_heads: 8
    num_blocks: 24
    patch_size: 2048
    dilation: 2
    buffer_size: 64
    drop_rate: 0.1
    use_checkpoint: true
    use_swin: true
    pos_emb_type: SinPosEmb

  training:
    max_epoch: 400
    lr: 1.0e-4
    weight_decay: 0.01
    batch_size: 1        # ocnn internal batching (multiple shapes per octree)
    use_amp: true
    mask_ratio_min: 0.5  # Masked prediction (not causal AR)
    num_iters: [64, 128, 128, 256]  # Per depth iteration count

  vqvae:
    model: vqvae_large
    embedding_channels: 32
    quantizer_type: bsq
    ckpt: saved_ckpt/vqvae_huge_im5_bsq32_200epoch.pth
    vae_depth: 8

  data:
    location: "data/ShapeNet/dataset_256"
    filelist_train: "data/ShapeNet/filelist/train_airplane.txt"
    filelist_test: "data/ShapeNet/filelist/test_airplane.txt"
    samples: 2831
    depth: 8

  # Expected metrics (from OctGPT paper / to be reproduced)
  metrics_target:
    1-NNA-CD-acc: "~50% (50% = indistinguishable)"
    COV-CD: "~50%+"
    MMD-CD: "TBD"
